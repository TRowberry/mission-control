# docker-compose.template.yml
# Copy this to docker-compose.yml and fill in your secrets
# DO NOT commit docker-compose.yml to git!

version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mission
      POSTGRES_PASSWORD: <YOUR_DB_PASSWORD>
      POSTGRES_DB: mission_control
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mission -d mission_control"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    expose:
      - "3000"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    links:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://mission:<YOUR_DB_PASSWORD>@<YOUR_HOST_IP>:5432/mission_control
      REDIS_URL: redis://<YOUR_HOST_IP>:6379
      JWT_SECRET: <YOUR_JWT_SECRET>
      NEXT_PUBLIC_APP_URL: <YOUR_PUBLIC_URL>
      OPENCLAW_GATEWAY_URL: <YOUR_OPENCLAW_GATEWAY_URL>
      OPENCLAW_GATEWAY_TOKEN: <YOUR_OPENCLAW_TOKEN>
      REGISTRATION_DISABLED: "true"
      PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: "1"
    volumes:
      - uploads_data:/app/public/uploads
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      REDIS_HOST: <YOUR_HOST_IP>
      REDIS_PORT: "6379"
      OPENCLAW_GATEWAY_URL: <YOUR_OPENCLAW_GATEWAY_URL>
      OPENCLAW_GATEWAY_TOKEN: <YOUR_OPENCLAW_TOKEN>
    depends_on:
      redis:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  postgres_data:
  uploads_data:
  redis_data:
  caddy_data:
  caddy_config:
