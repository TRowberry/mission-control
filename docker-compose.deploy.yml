version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: mission
      POSTGRES_PASSWORD: mission123
      POSTGRES_DB: mission_control
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - db_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mission -d mission_control"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  app:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    expose:
      - "3000"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    links:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://mission:mission123@db:5432/mission_control
      REDIS_URL: redis://redis:6379
      JWT_SECRET: -1yZ2cffHiVNgYpqZEtV3lusqZb3ezdjVFORSdorWFucPUVYtaEJmrIBZ1nT7teLhD2D6P495l1sDsELRxPpzQ
      REGISTRATION_DISABLED: "true"
      NEXT_PUBLIC_APP_URL: https://chatterbox.rowberry.com
      OPENCLAW_GATEWAY_URL: http://10.0.0.108:18789
      OPENCLAW_GATEWAY_TOKEN: openclaw_relay_token_2026
      PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: "1"
    volumes:
      - uploads_data:/app/public/uploads
      - db_backups:/backups:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      OPENCLAW_GATEWAY_URL: http://10.0.0.108:18789
      OPENCLAW_GATEWAY_TOKEN: openclaw_relay_token_2026
    depends_on:
      redis:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  postgres_data:
  db_backups:
  uploads_data:
  redis_data:
  caddy_data:
  caddy_config:
